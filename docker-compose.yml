version: '2'

services:
    db:
        container_name: postgresql_database
        image: postgres:latest
        volumes:
            - postgresql_database_data:/var/lib/postgresql
        restart: always
        ports:
            - 5432:5432
        environment:
            POSTGRES_DB: test_project
            POSTGRES_USER: kiwi
            POSTGRES_PASSWORD: kiwi

volumes:
    postgresql_database_data:
